<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>巴黎地图与导航综合版</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS for Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        #map { height: 100%; width: 100%; z-index: 1; }
        
        .day-card { transition: all 0.3s ease; border-left: 4px solid transparent; }
        .day-card.active { background-color: #f8fafc; }
    </style>
</head>
<body class="bg-gray-100 h-screen w-full overflow-hidden flex flex-col md:flex-row font-sans text-gray-800">

    <!-- 左侧：行程单与导航按钮 -->
    <div class="w-full md:w-[40%] lg:w-1/3 h-1/2 md:h-full bg-white shadow-xl flex flex-col z-10 relative">
        <div class="p-5 bg-gradient-to-r from-blue-700 to-blue-500 text-white shadow-md z-20 shrink-0">
            <h1 class="text-xl font-bold tracking-wide"><i class="fa-solid fa-map-location-dot mr-2"></i> 巴黎行程与导航助手</h1>
            <p class="text-xs mt-1 opacity-90">3.04 - 3.07 | 左侧点导航，右侧看地图</p>
            <button onclick="showAllDays()" class="mt-3 bg-white/20 hover:bg-white/30 text-white px-3 py-1.5 rounded-full text-xs font-semibold backdrop-blur-sm transition">
                <i class="fa-solid fa-expand mr-1"></i> 显示全局全览
            </button>
        </div>
        
        <div id="itinerary-list" class="flex-1 overflow-y-auto p-3 space-y-4 pb-10">
            <!-- JS 动态注入 -->
        </div>
    </div>

    <!-- 右侧：交互地图 -->
    <div class="w-full md:w-[60%] lg:w-2/3 h-1/2 md:h-full relative">
        <div id="map"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 行程数据配置 (5号与6号互换)
        const itineraryData = [
            {
                day: 1,
                date: "3月4日",
                title: "落地与塞纳河夜景",
                color: "#ef4444", // Red
                route: [
                    { name: "戴高乐机场 (CDG)", lat: 49.0097, lng: 2.5479, time: "19:15", desc: "抵达巴黎，出关拿行李后打车。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Paris+Charles+de+Gaulle+Airport", aMap: "http://maps.apple.com/?daddr=CDG+Airport+Paris" },
                    { name: "Bateaux Parisiens 游船", lat: 48.8601, lng: 2.2925, time: "21:30", desc: "赶游船班次。上车后点击下方导航。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Bateaux+Parisiens,Port+de+la+Bourdonnais,Paris&travelmode=driving", aMap: "http://maps.apple.com/?daddr=Bateaux+Parisiens,+Port+de+la+Bourdonnais,+Paris&dirflg=d" },
                    { name: "Convention Montparnasse 酒店", lat: 48.8365, lng: 2.2985, time: "22:30", desc: "游船结束后回酒店休息。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Hôtel+Convention+Montparnasse,Paris", aMap: "http://maps.apple.com/?daddr=Hotel+Convention+Montparnasse,+Paris" }
                ]
            },
            {
                day: 2,
                date: "3月5日",
                title: "慵懒早晨与凡尔赛宫",
                color: "#10b981", // Green
                route: [
                    { name: "酒店/15区早午餐", lat: 48.8365, lng: 2.2985, time: "10:30", desc: "睡到自然醒，在酒店附近享用法式 Brunch。", gMap: "https://www.google.com/maps/search/?api=1&query=Brasserie+near+Hôtel+Convention+Montparnasse,Paris", aMap: "http://maps.apple.com/?q=Brasserie&sll=48.8365,2.2985" },
                    { name: "凡尔赛宫", lat: 48.8049, lng: 2.1204, time: "14:00", desc: "下午2点入场。建议乘 RER C/N线。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Palace+of+Versailles&travelmode=transit", aMap: "http://maps.apple.com/?daddr=Palace+of+Versailles&dirflg=r" }
                ]
            },
            {
                day: 3,
                date: "3月6日",
                title: "暴走打卡与血拼",
                color: "#3b82f6", // Blue
                fullRouteGMap: "https://www.google.com/maps/dir/?api=1&origin=Louvre+Museum,Paris&destination=Galeries+Lafayette+Haussmann,Paris&waypoints=LV+DREAM,Paris|Saint+Laurent+Rive+Droite,Paris|Tuileries+Garden,Paris|Place+de+la+Concorde,Paris|Arc+de+Triomphe,Paris|Trocadéro,Paris&travelmode=walking",
                route: [
                    { name: "卢浮宫 (Louvre)", lat: 48.8606, lng: 2.3376, time: "10:30", desc: "深度游览蒙娜丽莎等。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Louvre+Museum,Paris", aMap: "http://maps.apple.com/?daddr=Louvre+Museum,+Paris" },
                    { name: "LV Dream", lat: 48.8587, lng: 2.3458, time: "13:00", desc: "买LV巧克力，喝咖啡。", gMap: "https://www.google.com/maps/dir/?api=1&destination=LV+DREAM,Paris&travelmode=walking", aMap: "http://maps.apple.com/?daddr=LV+DREAM,+Paris&dirflg=w" },
                    { name: "YSL 右岸概念店", lat: 48.8647, lng: 2.3308, time: "14:00", desc: "买胶卷相机 (Saint Laurent Rive Droite)。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Saint+Laurent+Rive+Droite,Paris&travelmode=walking", aMap: "http://maps.apple.com/?daddr=Saint+Laurent+Rive+Droite,+Paris&dirflg=w" },
                    { name: "杜乐丽 -> 协和 -> 凯旋门", lat: 48.8738, lng: 2.2950, time: "15:00", desc: "一路向西漫步至凯旋门。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Arc+de+Triomphe,Paris", aMap: "http://maps.apple.com/?daddr=Arc+de+Triomphe,+Paris" },
                    { name: "夏乐宫 (看铁塔)", lat: 48.8630, lng: 2.2871, time: "16:30", desc: "最佳机位 (Trocadéro)。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Trocadéro,Paris", aMap: "http://maps.apple.com/?daddr=Trocadero,+Paris" },
                    { name: "老佛爷百货", lat: 48.8735, lng: 2.3323, time: "18:30", desc: "找 Lemaire 专柜，20:30关门。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Galeries+Lafayette+Haussmann,Paris", aMap: "http://maps.apple.com/?daddr=Galeries+Lafayette+Haussmann,+Paris" }
                ]
            },
            {
                day: 4,
                date: "3月7日",
                title: "查漏补缺与返程",
                color: "#f59e0b", // Yellow
                route: [
                    { name: "玛黑区 Lemaire (备选)", lat: 48.8576, lng: 2.3614, time: "10:00", desc: "若老佛爷没货，来这家旗舰店补货。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Lemaire+flagship+store+Paris", aMap: "http://maps.apple.com/?daddr=Lemaire+flagship+store+Paris" },
                    { name: "戴高乐机场 (CDG)", lat: 49.0097, lng: 2.5479, time: "13:20", desc: "准备返程！15:50 飞曼城。", gMap: "https://www.google.com/maps/dir/?api=1&destination=Paris+Charles+de+Gaulle+Airport", aMap: "http://maps.apple.com/?daddr=CDG+Airport+Paris" }
                ]
            }
        ];

        let map;
        let layerGroup;

        // 初始化地图
        function initMap() {
            map = L.map('map').setView([48.8566, 2.3522], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM contributors &copy; CARTO'
            }).addTo(map);
            layerGroup = L.layerGroup().addTo(map);
        }

        // 渲染左侧列表
        function renderItinerary() {
            const listContainer = document.getElementById('itinerary-list');
            listContainer.innerHTML = '';

            itineraryData.forEach((dayData, index) => {
                const dayCard = document.createElement('div');
                dayCard.className = `day-card bg-white border border-gray-200 rounded-xl p-4 shadow-sm cursor-pointer`;
                dayCard.style.borderLeftColor = dayData.color;
                dayCard.id = `day-card-${index}`;
                dayCard.onclick = () => showDay(index);

                let fullRouteHtml = '';
                if(dayData.fullRouteGMap) {
                    fullRouteHtml = `
                        <div class="mt-2 mb-3">
                            <a href="${dayData.fullRouteGMap}" target="_blank" onclick="event.stopPropagation()" class="block w-full bg-blue-50 hover:bg-blue-100 text-blue-600 text-xs text-center py-2 rounded-lg font-bold border border-blue-200 transition">
                                <i class="fa-solid fa-route mr-1"></i> Google 全天串联导航 (强烈推荐)
                            </a>
                        </div>
                    `;
                }

                let pointsHtml = dayData.route.map((pt, ptIndex) => `
                    <div class="flex items-start mt-4">
                        <div class="flex flex-col items-center mr-3 mt-1">
                            <div class="w-3 h-3 rounded-full shadow-sm" style="background-color: ${dayData.color}"></div>
                            ${ptIndex < dayData.route.length - 1 ? `<div class="w-0.5 h-full bg-gray-200 my-1 min-h-[3rem]"></div>` : ''}
                        </div>
                        <div class="flex-1">
                            <p class="font-bold text-[15px] text-gray-800">${pt.time} <span class="ml-1">${pt.name}</span></p>
                            <p class="text-[13px] text-gray-500 mt-0.5 mb-2 leading-snug">${pt.desc}</p>
                            <div class="flex gap-2">
                                <a href="${pt.gMap}" target="_blank" onclick="event.stopPropagation()" class="flex-1 bg-gray-50 border border-gray-200 text-gray-600 text-center py-1.5 rounded-md text-[11px] font-semibold hover:bg-gray-100 transition"><i class="fa-brands fa-google text-blue-500"></i> Google</a>
                                <a href="${pt.aMap}" target="_blank" onclick="event.stopPropagation()" class="flex-1 bg-gray-50 border border-gray-200 text-gray-600 text-center py-1.5 rounded-md text-[11px] font-semibold hover:bg-gray-100 transition"><i class="fa-brands fa-apple text-black"></i> Apple</a>
                            </div>
                        </div>
                    </div>
                `).join('');

                dayCard.innerHTML = `
                    <div class="flex justify-between items-center mb-1">
                        <h2 class="text-base font-bold text-gray-800">Day ${dayData.day}: ${dayData.title}</h2>
                        <span class="text-xs text-gray-400 font-medium">${dayData.date}</span>
                    </div>
                    ${fullRouteHtml}
                    ${pointsHtml}
                `;

                listContainer.appendChild(dayCard);
            });
        }

        // 创建自定义图标
        function createCustomIcon(color, number) {
            return L.divIcon({
                className: 'custom-div-icon',
                html: `<div style="background-color: ${color}; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; color: white; font-weight: bold; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-size: 12px;">${number}</div>`,
                iconSize: [24, 24], iconAnchor: [12, 12], popupAnchor: [0, -12]
            });
        }

        // 显示某一天
        function showDay(dayIndex) {
            document.querySelectorAll('.day-card').forEach((card, idx) => {
                card.classList.toggle('active', idx === dayIndex);
            });

            layerGroup.clearLayers();
            const dayData = itineraryData[dayIndex];
            const latlngs = [];

            dayData.route.forEach((pt, index) => {
                const latlng = [pt.lat, pt.lng];
                latlngs.push(latlng);

                const marker = L.marker(latlng, { icon: createCustomIcon(dayData.color, index + 1) }).addTo(layerGroup);

                // 弹窗中也加入导航按钮
                marker.bindPopup(`
                    <div class="font-sans min-w-[180px]">
                        <h3 class="font-bold text-sm mb-1">${pt.name}</h3>
                        <p class="text-xs text-gray-600 mb-2">${pt.desc}</p>
                        <div class="flex gap-2">
                            <a href="${pt.gMap}" target="_blank" class="flex-1 block text-center bg-blue-50 text-blue-600 border border-blue-200 py-1 rounded text-xs no-underline"><i class="fa-brands fa-google"></i> 导航</a>
                            <a href="${pt.aMap}" target="_blank" class="flex-1 block text-center bg-gray-50 text-gray-700 border border-gray-200 py-1 rounded text-xs no-underline"><i class="fa-brands fa-apple"></i> 导航</a>
                        </div>
                    </div>
                `);
                
                if(index === 0) marker.openPopup();
            });

            if (latlngs.length > 1) {
                const polyline = L.polyline(latlngs, { color: dayData.color, weight: 4, opacity: 0.7, dashArray: '5, 8' }).addTo(layerGroup);
                map.fitBounds(polyline.getBounds(), { padding: [50, 50] });
            } else if (latlngs.length === 1) {
                map.setView(latlngs[0], 14);
            }
        }

        // 显示总览
        function showAllDays() {
            document.querySelectorAll('.day-card').forEach(card => card.classList.remove('active'));
            layerGroup.clearLayers();
            let allLatLngs = [];

            itineraryData.forEach((dayData) => {
                const latlngs = [];
                dayData.route.forEach((pt) => {
                    const latlng = [pt.lat, pt.lng];
                    latlngs.push(latlng);
                    allLatLngs.push(latlng);
                    L.marker(latlng, { icon: createCustomIcon(dayData.color, dayData.day) }).addTo(layerGroup).bindPopup(`<b>Day ${dayData.day}:</b> ${pt.name}`);
                });
                if (latlngs.length > 1) {
                    L.polyline(latlngs, { color: dayData.color, weight: 2, opacity: 0.5, dashArray: '4, 6' }).addTo(layerGroup);
                }
            });

            if (allLatLngs.length > 0) map.fitBounds(L.latLngBounds(allLatLngs), { padding: [50, 50] });
        }

        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            renderItinerary();
            showAllDays();
        });
    </script>
</body>
</html>
